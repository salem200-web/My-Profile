<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA 23 Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Orbitron',sans-serif;
  background:url('fifa23-bg.jpg') center/cover no-repeat fixed;
  overflow-x:hidden;
  color:#fff;
  perspective:1200px;
}

/* Overlay */
body::after{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  top:0;left:0;
  z-index:-2;
}

/* Navbar */
.navbar{
  padding:20px;
  text-align:center;
  font-size:24px;
  background:rgba(0,0,0,0.7);
  color:#00ffea;
  text-shadow:0 0 20px #00ffea;
}

/* Title */
.title{
  font-size:70px;
  text-align:center;
  margin:50px 0;
  color:#ffea00;
  text-shadow:0 0 30px #ffea00,0 0 60px #ff0000;
  animation:titleFly 2s ease forwards;
  opacity:0;
  transform:translateY(-200px);
}

@keyframes titleFly{
  to{opacity:1;transform:translateY(0);}
}

/* Detail lines */
.detail-line{
  text-align:center;
  font-size:22px;
  margin:15px 0;
  animation:fadeIn 2s forwards;
  opacity:0;
}
@keyframes fadeIn{to{opacity:1;}}

/* Button */
#actionBtn{
  display:block;
  margin:40px auto;
  padding:18px 60px;
  font-size:24px;
  border:2px solid #00ffea;
  background:#111;
  color:#00ffea;
  cursor:pointer;
  transition:0.3s;
}

#actionBtn:hover{
  background:#00ffea;
  color:#111;
  box-shadow:0 0 60px #00ffea;
  transform:scale(1.1);
}

/* ===== 3D Rotating Ball ===== */
.ball{
  position:absolute;
  width:90px;
  height:90px;
  background:url('football.png') center/cover no-repeat;
  left:50%;
  transform-style:preserve-3d;
  bottom:20%;
  animation:bounce 2s infinite ease-in-out, rotate3d 3s linear infinite;
  filter: drop-shadow(0 0 25px #ffea00);
}

@keyframes bounce{
  0%,100%{transform:translateX(-50%) translateY(0);}
  50%{transform:translateX(-50%) translateY(-160px);}
}

@keyframes rotate3d{
  from{rotate:0deg;}
  to{rotate:360deg;}
}

/* Energy glow */
.ball::after{
  content:"";
  position:absolute;
  width:150%;
  height:150%;
  top:-25%;
  left:-25%;
  background:radial-gradient(circle,rgba(255,234,0,0.4),transparent 70%);
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%,100%{opacity:0.5; transform:scale(1);}
  50%{opacity:1; transform:scale(1.2);}
}

/* Sparks */
.spark{
  position:absolute;
  width:6px;
  height:6px;
  border-radius:50%;
  background:radial-gradient(circle,#ffea00,transparent);
  pointer-events:none;
  animation:sparkMove 0.8s linear forwards;
}

@keyframes sparkMove{
  from{opacity:1; transform:translate(0,0);}
  to{opacity:0; transform:translate(var(--x),var(--y));}
}
</style>
</head>

<body>

<div class="navbar">FIFA 23 HUB</div>

<section class="game-details">
<h1 class="title">FIFA 23</h1>

<p class="detail-line">Type: Sports, Soccer</p>
<p class="detail-line">Release Date: September 2022</p>
<p class="detail-line">Rating: 9.5/10</p>
<p class="detail-line">Play exciting football matches with realistic graphics!</p>

<button id="actionBtn">START MATCH</button>
</section>

<div class="ball"></div>

<script>
const ball = document.querySelector('.ball');

/* Sparks on click */
ball.addEventListener("click", e=>{
  for(let i=0;i<15;i++){
    const s=document.createElement("div");
    s.classList.add("spark");
    const x=(Math.random()*200-100)+"px";
    const y=(Math.random()*200-100)+"px";
    s.style.setProperty('--x',x);
    s.style.setProperty('--y',y);
    s.style.left=e.pageX+"px";
    s.style.top=e.pageY+"px";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),800);
  }
});

/* Button bounce boost */
document.getElementById('actionBtn').addEventListener('click',()=>{
  ball.style.animation="bounce 0.5s ease, rotate3d 1s linear infinite";
  setTimeout(()=>{
    ball.style.animation="bounce 2s infinite ease-in-out, rotate3d 3s linear infinite";
  },500);
  alert("Match Started!");
});
</script>

</body>
</html>
