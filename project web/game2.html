<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>God of War - Gaming Hub</title>

<style>
body {
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
              url('gow.jpg') center/cover no-repeat fixed;
  color: #fff;
  font-family: Arial, sans-serif;
  margin: 0;
}

.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 50px;
  background: #111;
  position: sticky;
  top: 0;
}

.navbar .logo {
  color: #00aaff;
  font-weight: bold;
  font-size: 20px;
}

.nav-links li {
  display: inline-block;
  margin: 0 15px;
}

.nav-links a {
  color: white;
  text-decoration: none;
}

.game-details {
  padding: 60px 20px;
  max-width: 900px;
  margin: auto;
}

.game-details h1 {
  font-size: 40px;
  color: #00aaff;
  margin-bottom: 20px;
  opacity: 0;
  animation: fadeInDown 1s forwards;
}

.detail-line {
  margin-bottom: 15px;
  font-size: 18px;
  opacity: 0;
}

.detail-line:hover {
  color: #00aaff;
  transition: 0.3s;
}

#buyBtn {
  margin-top: 30px;
  padding: 12px 25px;
  background: #00aaff;
  color: #fff;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-size: 18px;
  transition: 0.3s;
  box-shadow: 0 0 15px #00aaff;
}

#buyBtn:hover {
  background: #0088cc;
  box-shadow: 0 0 25px #00aaff;
  transform: scale(1.05);
}

.stars {
  color: gold;
  font-size: 20px;
  letter-spacing: 3px;
}

@keyframes fadeInDown {
  0% {opacity: 0; transform: translateY(-20px);}
  100% {opacity: 1; transform: translateY(0);}
}

.typing-text {
  display: inline-block;
  overflow: hidden;
  white-space: nowrap;
  border-right: 2px solid #00aaff;
}
</style>
</head>

<body>

<nav class="navbar">
  <div class="logo">Gaming Hub</div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="index.html#games">Games</a></li>
  </ul>
</nav>

<section class="game-details">
  <h1>God of War (2018)</h1>
  
  <p class="detail-line"><strong>Type:</strong> Action, Adventure</p>
  <p class="detail-line"><strong>Release Date:</strong> April 2018</p>
  <p class="detail-line"><strong>Rating:</strong> 8.8/10</p>
  <p class="detail-line">
    <strong>User Rating:</strong>
    <span class="stars">★★★★★</span>
  </p>

  <p class="detail-line"><strong>Description:</strong> 
    <span class="typing-text" id="description"></span>
  </p>

  <p class="detail-line"><strong>Story:</strong> 
    <span class="typing-text" id="story"></span>
  </p>

  <button id="buyBtn">BUY NOW</button>
</section>

<script>
document.addEventListener('DOMContentLoaded', () => {

  const buyBtn = document.getElementById('buyBtn');
  buyBtn.addEventListener('click', () => {
    window.location.href = "checkout.html";
  });

  function typeText(elementId, text, speed = 40) {
    const element = document.getElementById(elementId);
    let i = 0;
    function typing() {
      if (i < text.length) {
        element.innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, speed);
      }
    }
    typing();
  }

  const descriptionText =
  "A cinematic action-adventure game set in Norse mythology. Experience brutal combat and emotional storytelling.";

  const storyText =
  "Kratos, now living in the world of Norse gods, must guide his son Atreus on a journey to fulfill his wife's final wish while facing powerful gods and monsters.";

  setTimeout(() => typeText('description', descriptionText), 500);
  setTimeout(() => typeText('story', storyText), 2000);

  const details = document.querySelectorAll('.detail-line');
  details.forEach((el, index) => {
    el.style.animation = `fadeInDown 0.8s forwards`;
    el.style.animationDelay = `${index * 0.3 + 1}s`;
  });

});
</script>

</body>
</html>
