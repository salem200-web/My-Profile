<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COD: Warzone Hub</title>

<!-- Military / Stencil font -->
<link href="https://fonts.googleapis.com/css2?family=Staatliches&display=swap" rel="stylesheet">

<style>
/* ===== Body ===== */
body {
  margin: 0;
  font-family: 'Staatliches', sans-serif;
  background: url('warzone-bg.jpg') center/cover no-repeat fixed;
  color: #fff;
  overflow-x: hidden;
  position: relative;
  background-color: #0a0a0a;
}

/* ===== Dark overlay + moving clouds ===== */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
  top: 0;
  left: 0;
  z-index: -2;
}

/* ===== Particles ===== */
.particle {
  position: fixed;
  width: 6px;
  height: 6px;
  background: radial-gradient(circle, #ffa500, transparent);
  border-radius: 50%;
  opacity: 0.7;
  animation: floatParticle linear infinite;
  z-index: 0;
}

.smoke {
  position: fixed;
  width: 40px;
  height: 40px;
  background: radial-gradient(circle, rgba(128,128,128,0.6), transparent);
  border-radius: 50%;
  opacity: 0.4;
  animation: floatSmoke linear infinite;
  z-index: 0;
}

@keyframes floatParticle {
  0% { transform: translateY(110vh) rotate(0deg) scale(0); opacity:0; }
  50% { opacity:0.8; }
  100% { transform: translateY(-20vh) rotate(360deg) scale(1); opacity:0; }
}

@keyframes floatSmoke {
  0% { transform: translateY(100vh) rotate(0deg) scale(0.5); opacity:0; }
  50% { opacity:0.5; }
  100% { transform: translateY(-50vh) rotate(360deg) scale(2); opacity:0; }
}

/* ===== Navbar ===== */
.navbar {
  padding: 20px 50px;
  background: rgba(0,0,0,0.85);
  text-align: center;
  letter-spacing: 2px;
  font-size: 24px;
  color: #00ffcc;
  text-shadow: 0 0 15px #00ffcc;
}

/* ===== Main Section ===== */
.game-details {
  padding: 120px 20px;
  max-width: 1000px;
  margin: auto;
  text-align: center;
}

/* ===== Warzone Title fly-in ===== */
.title {
  font-size: 80px;
  color: #ffcc00;
  text-transform: uppercase;
  text-shadow: 0 0 20px #ffcc00, 0 0 40px #ff6600;
  opacity: 0;
  transform: translateY(-200px) rotateX(30deg);
  animation: flyIn 2s ease forwards;
}

@keyframes flyIn {
  0% { opacity: 0; transform: translateY(-200px) rotateX(30deg); }
  60% { opacity: 1; transform: translateY(30px) rotateX(-10deg); }
  100% { opacity: 1; transform: translateY(0) rotateX(0deg); }
}

/* ===== Detail lines slide-in from right ===== */
.detail-line {
  margin: 20px 0;
  font-size: 22px;
  color: #fff;
  opacity: 0;
  transform: translateX(200px);
  animation: slideIn 1.5s forwards;
}

.detail-line:nth-child(2) { animation-delay: 1s; }
.detail-line:nth-child(3) { animation-delay: 1.3s; }
.detail-line:nth-child(4) { animation-delay: 1.6s; }

@keyframes slideIn {
  to { opacity: 1; transform: translateX(0); }
}

/* ===== Action Button ===== */
#actionBtn {
  margin-top: 50px;
  padding: 18px 60px;
  background: #111;
  color: #00ffcc;
  border: 2px solid #00ffcc;
  font-size: 24px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: 0.3s;
}

#actionBtn:hover {
  background: #00ffcc;
  color: #111;
  box-shadow: 0 0 60px #00ffcc, 0 0 100px #00ffcc;
}

/* ===== Loot drop / explosion ===== */
.loot {
  position: absolute;
  width: 50px;
  height: 50px;
  background: url('warzone-loot.png') center/cover no-repeat;
  animation: lootDrop 0.8s forwards;
}

@keyframes lootDrop {
  0% { transform: translateY(-80px) scale(0); opacity:0; }
  50% { transform: translateY(50px) scale(1.3); opacity:1; }
  100% { transform: translateY(0) scale(1); opacity:1; }
}

.explosion {
  position: absolute;
  width: 120px;
  height: 120px;
  background: radial-gradient(circle, rgba(255,140,0,0.9), transparent);
  border-radius: 50%;
  animation: explode 0.8s forwards;
}

@keyframes explode {
  0% { transform: scale(0.5); opacity:1; }
  100% { transform: scale(3); opacity:0; }
}
</style>
</head>

<body>

<!-- Particles -->
<div id="particleContainer"></div>

<div class="navbar">CALL OF DUTY: WARZONE HUB</div>

<section class="game-details">
  <h1 class="title">WARZONE</h1>

  <p class="detail-line"><strong>Type:</strong> Battle Royale, Shooter</p>
  <p class="detail-line"><strong>Release Date:</strong> March 2020</p>
  <p class="detail-line"><strong>Rating:</strong> 9.8/10</p>

  <p class="detail-line">
    Drop into Verdansk, loot weapons, survive the gas, and be the last squad standing.
  </p>

  <button id="actionBtn">AIRDROP</button>
</section>

<script>
// ===== Particles & smoke =====
const container = document.getElementById('particleContainer');
for(let i=0;i<50;i++){
  const p = document.createElement('div');
  p.classList.add('particle');
  p.style.left = Math.random()*100+'vw';
  p.style.animationDuration = (3+Math.random()*5)+'s';
  p.style.width = p.style.height = (4+Math.random()*12)+'px';
  container.appendChild(p);
}
for(let i=0;i<25;i++){
  const s = document.createElement('div');
  s.classList.add('smoke');
  s.style.left = Math.random()*100+'vw';
  s.style.animationDuration = (6+Math.random()*8)+'s';
  s.style.width = s.style.height = (20+Math.random()*50)+'px';
  container.appendChild(s);
}

// ===== Loot + explosion + sound =====
document.getElementById("actionBtn").addEventListener("click", function(e){
  // Loot drops
  for(let i=0;i<5;i++){
    const loot = document.createElement("div");
    loot.classList.add("loot");
    loot.style.left = Math.random()*window.innerWidth+"px";
    loot.style.top = Math.random()*window.innerHeight+"px";
    document.body.appendChild(loot);
    setTimeout(()=>loot.remove(),1200);
  }

  // Explosion
  const explosion = document.createElement("div");
  explosion.classList.add("explosion");
  explosion.style.left = e.clientX-60+"px";
  explosion.style.top = e.clientY-60+"px";
  document.body.appendChild(explosion);
  setTimeout(()=>explosion.remove(),800);

  // Optional sound (needs warzone-sound.mp3)
  const audio = new Audio('warzone-sound.mp3');
  audio.play();

  alert("Airdrop deployed!");
});
</script>

</body>
</html>
